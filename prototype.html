
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
#root{background:#03091a;border-radius:16px;overflow:hidden;font-family:system-ui,sans-serif;color:#d0e8f4}
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid rgba(255,255,255,0.08);padding:0 20px}
.tab{padding:12px 18px;font-size:12px;font-weight:500;color:rgba(180,210,240,0.45);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;letter-spacing:.03em}
.tab.on{color:rgba(210,235,255,0.92);border-bottom-color:rgba(210,235,255,0.5)}
.pane{display:none}.pane.on{display:block}
#chart-wrap{position:relative;width:100%}
canvas#bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
canvas#art{display:block;width:100%;position:relative;z-index:2}
#cht{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;cursor:crosshair}
#tip{position:absolute;z-index:10;display:none;pointer-events:none;background:rgba(3,9,26,0.96);border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;font-size:11px;min-width:200px}
#tip .ty{font-size:10px;color:#4a7a9b;letter-spacing:.07em;margin-bottom:5px}
#tip .tr{display:flex;align-items:center;gap:6px;margin:3px 0}
#tip .tc{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#tip .tconf{font-size:9px;color:#3a6a8a;margin-left:2px}
#map-wrap{position:relative;padding:20px 20px 16px}
#map-canvas{display:block;width:100%;border-radius:10px;background:#051428}
.map-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;padding:0 2px}
.ml-item{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(160,200,230,0.7);cursor:pointer;padding:4px 8px;border-radius:6px;border:0.5px solid transparent;transition:border-color .15s,background .15s;user-select:none}
.ml-item.active{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.05)}
.ml-item:hover{background:rgba(255,255,255,0.04)}
.ml-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#map-tip{position:absolute;display:none;background:rgba(3,9,26,0.95);border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;padding:8px 12px;font-size:11px;color:#cce4f4;pointer-events:none;z-index:20;max-width:200px;line-height:1.5}
</style>

<div id="root">
  <div class="tab-bar">
    <div class="tab on" id="t-pop">Population trends</div>
    <div class="tab" id="t-map">Whale watching map</div>
  </div>

  <div class="pane on" id="p-pop">
    <div id="chart-wrap">
      <canvas id="bg"></canvas>
      <canvas id="art" aria-label="Whale population trends 1900-2024 for six species with uncertainty bands and animated ocean life"></canvas>
      <div id="cht"></div>
      <div id="tip"><div class="ty"></div></div>
    </div>
  </div>

  <div class="pane" id="p-map">
    <div id="map-wrap">
      <canvas id="map-canvas" aria-label="World map showing best whale watching locations per species"></canvas>
      <div id="map-tip"></div>
      <div class="map-legend" id="map-legend"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const W=680,H=720,PL=60,PR=96,PT=116,PB=112;
const CW=W-PL-PR,CH=H-PT-PB;
const years=[1900,1910,1920,1930,1940,1950,1960,1970,1980,1986,1990,1995,2000,2005,2010,2015,2020,2024];

const SPECIES=[
  {name:'Sperm whale',  color:'#4ecdc4',kind:'sperm',
   pts:[[1000,700,1300],[950,660,1240],[870,600,1150],[780,530,1040],[700,470,940],[620,415,840],[520,340,710],[430,270,600],[400,300,510],[390,295,500],[395,305,495],[420,330,515],[440,355,535],[480,390,575],[520,425,620],[560,460,660],[600,490,715],[640,530,760]],
   obs:[false,false,false,false,false,false,false,false,true,true,true,true,true,true,true,true,true,true]},
  {name:'Fin whale',    color:'#a78bfa',kind:'fin',
   pts:[[700,350,1050],[640,310,980],[555,260,870],[445,200,720],[340,150,570],[235,100,420],[138,60,260],[98,50,180],[93,52,148],[88,50,140],[90,52,140],[96,56,145],[99,59,148],[101,61,150],[104,64,153],[107,67,156],[110,70,158],[114,74,162]],
   obs:[false,false,false,false,false,false,false,false,true,true,true,true,true,true,true,true,true,true]},
  {name:'S. Right whale',color:'#86efac',kind:'right',
   pts:[[80,40,120],[65,30,105],[45,20,80],[24,10,48],[13,5,26],[7,2,14],[4.5,1.5,9],[3.5,1,7],[5,2,9],[6,2.5,10],[8,4,13],[12,7,18],[17,11,24],[22,15,30],[28,21,36],[34,27,43],[41,33,50],[48,40,58]],
   obs:[false,false,false,false,false,false,false,false,true,true,true,true,true,true,true,true,true,true]},
  {name:'Humpback',     color:'#fbbf24',kind:'humpback',
   pts:[[125,80,165],[108,68,148],[82,50,118],[52,30,80],[33,18,52],[18,9,32],[11,5,19],[9,4,16],[14,9,20],[16,11,22],[22,17,28],[32,26,39],[44,37,52],[54,47,62],[64,57,72],[71,64,79],[77,70,85],[83,76,91]],
   obs:[false,false,false,false,false,false,false,true,true,true,true,true,true,true,true,true,true,true]},
  {name:'Blue whale',   color:'#f87171',kind:'blue',
   pts:[[280,150,420],[238,120,370],[175,85,295],[105,50,195],[58,25,115],[24,9,55],[8,3,18],[5,1.5,11],[5.2,2,11],[5.8,2.5,12],[6.5,3,13],[7.5,3.5,14],[8.5,4,16],[9.5,4.5,18],[10.5,5,20],[12,6,22],[13.5,6.5,24],[15,7,27]],
   obs:[false,false,false,false,false,false,false,false,true,true,true,true,true,true,true,true,true,true]},
  {name:'Killer whale', color:'#e2e8f0',kind:'orca',
   pts:[[58,35,80],[57,34,79],[55,32,77],[54,31,76],[52,30,74],[51,29,72],[50,28,71],[50,28,71],[50,28,71],[50,28,71],[51,29,72],[51,29,72],[51,29,72],[51,29,72],[51,29,72],[51,30,73],[51,30,73],[52,30,74]],
   obs:[false,false,false,false,false,false,false,false,false,true,true,true,true,true,true,true,true,true]},
];
const MAX_VAL=1150;

// ── WHALE SILHOUETTE PATHS (normalised, facing right) ──────────────────
function whalePath(ctx,kind,cx,cy,w,h){
  ctx.save();ctx.translate(cx,cy);
  if(kind==='sperm'){
    ctx.beginPath();
    ctx.moveTo(-w*.5,h*.05);
    ctx.bezierCurveTo(-w*.35,-h*.35,w*.2,-h*.42,w*.38,-h*.18);
    ctx.bezierCurveTo(w*.48,-h*.04,w*.48,h*.04,w*.38,h*.18);
    ctx.bezierCurveTo(w*.2,h*.42,-w*.35,h*.35,-w*.5,h*.05);
    ctx.closePath();
    ctx.moveTo(w*.3,-h*.14);ctx.lineTo(w*.55,-h*.42);ctx.lineTo(w*.42,-h*.06);
    ctx.moveTo(w*.3,h*.14);ctx.lineTo(w*.55,h*.42);ctx.lineTo(w*.42,h*.06);
  } else if(kind==='fin'){
    ctx.beginPath();
    ctx.moveTo(-w*.52,h*.08);
    ctx.bezierCurveTo(-w*.38,-h*.38,w*.22,-h*.44,w*.4,-h*.16);
    ctx.bezierCurveTo(w*.5,-h*.03,w*.5,h*.03,w*.4,h*.16);
    ctx.bezierCurveTo(w*.22,h*.44,-w*.38,h*.38,-w*.52,h*.08);
    ctx.closePath();
    ctx.moveTo(w*.32,-h*.14);ctx.lineTo(w*.58,-h*.44);ctx.lineTo(w*.44,-h*.08);
    ctx.moveTo(w*.32,h*.14);ctx.lineTo(w*.58,h*.44);ctx.lineTo(w*.44,h*.08);
    ctx.moveTo(-w*.05,-h*.42);ctx.lineTo(w*.1,-h*.06);ctx.lineTo(w*.25,-h*.42);
  } else if(kind==='right'){
    ctx.beginPath();
    ctx.moveTo(-w*.5,0);
    ctx.bezierCurveTo(-w*.32,-h*.5,w*.15,-h*.6,w*.38,-h*.2);
    ctx.bezierCurveTo(w*.5,-h*.05,w*.5,h*.05,w*.38,h*.2);
    ctx.bezierCurveTo(w*.15,h*.6,-w*.32,h*.5,-w*.5,0);
    ctx.closePath();
    ctx.moveTo(w*.28,-h*.16);ctx.lineTo(w*.55,-h*.52);ctx.lineTo(w*.4,-h*.08);
    ctx.moveTo(w*.28,h*.16);ctx.lineTo(w*.55,h*.52);ctx.lineTo(w*.4,h*.08);
    ctx.moveTo(-w*.18,-h*.58);ctx.bezierCurveTo(-w*.08,-h*.92,w*.06,-h*.92,w*.14,-h*.58);ctx.closePath();
  } else if(kind==='humpback'){
    ctx.beginPath();
    ctx.moveTo(-w*.48,0);
    ctx.bezierCurveTo(-w*.32,-h*.46,w*.18,-h*.5,w*.38,-h*.18);
    ctx.bezierCurveTo(w*.5,-h*.04,w*.5,h*.04,w*.38,h*.18);
    ctx.bezierCurveTo(w*.18,h*.5,-w*.32,h*.46,-w*.48,0);
    ctx.closePath();
    ctx.moveTo(w*.3,-h*.14);ctx.lineTo(w*.56,-h*.48);ctx.lineTo(w*.42,-h*.08);
    ctx.moveTo(w*.3,h*.14);ctx.lineTo(w*.56,h*.48);ctx.lineTo(w*.42,h*.08);
    ctx.moveTo(-w*.02,-h*.48);ctx.lineTo(w*.12,-h*.92);ctx.lineTo(w*.26,-h*.48);ctx.closePath();
    ctx.moveTo(-w*.38,-h*.28);ctx.bezierCurveTo(-w*.28,-h*.52,-w*.08,-h*.48,w*.02,-h*.28);
  } else if(kind==='blue'){
    ctx.beginPath();
    ctx.moveTo(-w*.58,h*.06);
    ctx.bezierCurveTo(-w*.4,-h*.36,w*.28,-h*.42,w*.46,-h*.14);
    ctx.bezierCurveTo(w*.56,-h*.02,w*.56,h*.02,w*.46,h*.14);
    ctx.bezierCurveTo(w*.28,h*.42,-w*.4,h*.36,-w*.58,h*.06);
    ctx.closePath();
    ctx.moveTo(w*.36,-h*.12);ctx.lineTo(w*.64,-h*.44);ctx.lineTo(w*.5,0);ctx.lineTo(w*.64,h*.44);ctx.lineTo(w*.36,h*.12);
  } else { // orca
    ctx.beginPath();
    ctx.moveTo(-w*.44,h*.04);
    ctx.bezierCurveTo(-w*.28,-h*.38,w*.2,-h*.42,w*.38,-h*.16);
    ctx.bezierCurveTo(w*.48,-h*.03,w*.48,h*.03,w*.38,h*.16);
    ctx.bezierCurveTo(w*.2,h*.42,-w*.28,h*.38,-w*.44,h*.04);
    ctx.closePath();
    ctx.moveTo(w*.28,-h*.14);ctx.lineTo(w*.52,-h*.46);ctx.lineTo(w*.4,-h*.08);
    ctx.moveTo(w*.28,h*.14);ctx.lineTo(w*.52,h*.46);ctx.lineTo(w*.4,h*.08);
    ctx.moveTo(-w*.06,-h*.42);ctx.lineTo(w*.08,-h*.92);ctx.lineTo(w*.24,-h*.42);ctx.closePath();
  }
  ctx.restore();
}

// ── CHART SETUP ────────────────────────────────────────────────────────
const cw=document.getElementById('chart-wrap');
const bgC=document.getElementById('bg');
const artC=document.getElementById('art');
artC.width=W*2;artC.height=H*2;artC.style.height=H+'px';
bgC.width=W*2;bgC.height=H*2;bgC.style.height=H+'px';bgC.style.width='100%';
const ctx=artC.getContext('2d');ctx.scale(2,2);
const bgx=bgC.getContext('2d');bgx.scale(2,2);

function xOf(i){return PL+(i/(years.length-1))*CW;}
function yOf(v){return PT+CH-(v/MAX_VAL)*CH;}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function drawSpline(c,pts,t=0.38){
  if(pts.length<2)return;
  c.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    c.bezierCurveTo(p1[0]+(p2[0]-p0[0])*t,p1[1]+(p2[1]-p0[1])*t,p2[0]-(p3[0]-p1[0])*t,p2[1]-(p3[1]-p1[1])*t,p2[0],p2[1]);
  }
}

function drawFish(c,x,y,s,col,flip){
  c.save();c.translate(x,y);if(flip)c.scale(-1,1);
  c.globalAlpha=0.12;c.fillStyle=col;
  c.beginPath();c.ellipse(0,0,s*1.4,s*0.5,0,0,Math.PI*2);c.fill();
  c.beginPath();c.moveTo(s*1.1,0);c.lineTo(s*1.85,-s*0.55);c.lineTo(s*1.85,s*0.55);c.closePath();c.fill();
  c.restore();
}

function drawWhaleBg(c,x,y,size,col,flip,kind){
  c.save();c.translate(x,y);if(flip)c.scale(-1,1);
  c.globalAlpha=0.09;c.fillStyle=col;c.strokeStyle=col;c.lineWidth=0.5;
  whalePath(c,kind,0,0,size*2,size);
  c.fill();c.stroke();
  c.restore();
}

const rng=s=>{let v=s;return()=>{v=(v*16807)%2147483647;return(v-1)/2147483646;}};
const r1=rng(42);
const stars=Array.from({length:90},()=>({x:r1()*W,y:r1()*H*.6,r:r1()*1.0+.2,a:r1()*.45+.1}));
const r2=rng(77);
const fish=Array.from({length:28},()=>({x:r2()*W,y:r2()*(CH*.85)+PT*.4,sz:r2()*2.8+2,col:['#4ecdc4','#a78bfa','#86efac','#7ec8e3'][Math.floor(r2()*4)],flip:r2()>.5,sp:r2()*.14+.04,ph:r2()*Math.PI*2,wr:r2()*.25+.07}));
const r3=rng(13);
const wShadows=SPECIES.map(sp=>Array.from({length:3},()=>{
  const xi=Math.floor(r3()*(years.length-2));
  const fr=r3()*.6+.2;
  const rx=xOf(xi)+fr*(xOf(xi+1)-xOf(xi));
  const v0=sp.pts[xi][0],v1=sp.pts[xi+1][0];
  const ry=yOf(v0+fr*(v1-v0));
  const depth=(v0+fr*(v1-v0))/MAX_VAL;
  return{x:rx,y:ry+r3()*18-9+(1-depth)*18,sz:depth*11+4,col:sp.color,flip:r3()>.5,kind:sp.kind,dr:r3()*.3-.15,ph:r3()*Math.PI*2};
})).flat();

function drawBg(){
  bgx.clearRect(0,0,W,H);bgx.fillStyle='#03091a';bgx.fillRect(0,0,W,H);
  for(let row=0;row<H;row++){bgx.fillStyle=`rgba(0,40,80,${.02+row/H*.036})`;bgx.fillRect(0,row,W,1);}
  stars.forEach(s=>{bgx.beginPath();bgx.arc(s.x,s.y,s.r,0,Math.PI*2);bgx.fillStyle=`rgba(180,220,255,${s.a})`;bgx.fill();});
}

let ft=0;
function drawChartFrame(hxRaw){
  ctx.clearRect(0,0,W,H);ft+=.011;
  fish.forEach(f=>{f.x+=f.flip?-f.sp*.5:f.sp*.5;if(f.x>W+30)f.x=-30;if(f.x<-30)f.x=W+30;drawFish(ctx,f.x,f.y+Math.sin(ft*f.sp*8+f.ph)*f.wr*10,f.sz,f.col,f.flip);});
  wShadows.forEach(ws=>drawWhaleBg(ctx,ws.x+Math.sin(ft*.38+ws.ph)*16,ws.y+Math.sin(ft*.22+ws.ph*1.3)*ws.dr*8,ws.sz,ws.col,ws.flip,ws.kind));

  const firstObsX=xOf(SPECIES[0].obs.findIndex(o=>o));
  ctx.fillStyle='rgba(255,255,255,.012)';ctx.fillRect(firstObsX,PT-10,PL+CW-firstObsX,CH+10);
  ctx.beginPath();ctx.moveTo(firstObsX,PT-16);ctx.lineTo(firstObsX,PT+CH+4);
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.8;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
  ctx.font='400 9px system-ui,sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(200,200,200,.22)';
  ctx.fillText('← modelled',firstObsX-42,PT-22);ctx.fillText('survey-based →',firstObsX+52,PT-22);

  SPECIES.forEach(sp=>{
    const [r,g,b]=hexRgb(sp.color);
    const bp=sp.pts.map((p,i)=>[xOf(i),yOf(p[0])]);
    const lp=sp.pts.map((p,i)=>[xOf(i),yOf(p[1])]);
    const hp=sp.pts.map((p,i)=>[xOf(i),yOf(p[2])]);
    const os=sp.obs.findIndex(o=>o);
    ctx.beginPath();drawSpline(ctx,hp.slice(0,os+1));drawSpline(ctx,[...lp.slice(0,os+1)].reverse());ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},.06)`;ctx.fill();
    ctx.beginPath();drawSpline(ctx,hp.slice(os));drawSpline(ctx,[...lp.slice(os)].reverse());ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},.12)`;ctx.fill();
    ctx.beginPath();drawSpline(ctx,lp);ctx.strokeStyle=`rgba(${r},${g},${b},.2)`;ctx.lineWidth=.6;ctx.setLineDash([2,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();drawSpline(ctx,hp);ctx.strokeStyle=`rgba(${r},${g},${b},.2)`;ctx.lineWidth=.6;ctx.setLineDash([2,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();drawSpline(ctx,bp.slice(0,os+1));ctx.strokeStyle=`rgba(${r},${g},${b},.5)`;ctx.lineWidth=1.4;ctx.setLineDash([5,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.beginPath();drawSpline(ctx,bp.slice(os));ctx.strokeStyle=`rgba(${r},${g},${b},.9)`;ctx.lineWidth=1.8;ctx.stroke();
    sp.pts.forEach((p,i)=>{const px=xOf(i),py=yOf(p[0]);if(sp.obs[i]){ctx.beginPath();ctx.arc(px,py,2.3,0,Math.PI*2);ctx.fillStyle=sp.color;ctx.fill();}else{ctx.beginPath();ctx.arc(px,py,2.1,0,Math.PI*2);ctx.strokeStyle=`rgba(${r},${g},${b},.45)`;ctx.lineWidth=.8;ctx.stroke();}});
  });

  [0,250,500,750,1000].forEach(v=>{
    const gy=yOf(v);
    ctx.beginPath();ctx.moveTo(PL,gy);ctx.lineTo(PL+CW,gy);
    ctx.strokeStyle=v===0?'rgba(255,255,255,.1)':'rgba(255,255,255,.04)';ctx.lineWidth=.5;ctx.setLineDash(v===0?[]:[3,6]);ctx.stroke();ctx.setLineDash([]);
    if(v>0){ctx.font='400 10px system-ui,sans-serif';ctx.fillStyle='rgba(130,180,215,.35)';ctx.textAlign='right';ctx.fillText((v/1000).toFixed(2)+'M',PL-7,gy+4);}
  });

  const morX=xOf(years.indexOf(1986));
  ctx.beginPath();ctx.moveTo(morX,PT-16);ctx.lineTo(morX,PT+CH);ctx.strokeStyle='rgba(255,225,80,.18)';ctx.lineWidth=1;ctx.setLineDash([4,5]);ctx.stroke();ctx.setLineDash([]);
  ctx.font='400 9px system-ui,sans-serif';ctx.fillStyle='rgba(255,225,80,.4)';ctx.textAlign='center';ctx.fillText('IWC moratorium 1986',morX,PT-19);

  [1900,1920,1940,1960,1980,2000,2020,2024].forEach(y=>{
    const i=years.indexOf(y);if(i<0)return;const gx=xOf(i);
    ctx.beginPath();ctx.moveTo(gx,PT+CH);ctx.lineTo(gx,PT+CH+7);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=.5;ctx.stroke();
    ctx.font='400 10px system-ui,sans-serif';ctx.fillStyle='rgba(130,180,215,.35)';ctx.textAlign='center';ctx.fillText(y,gx,PT+CH+18);
  });

  // right-side labels
  const sorted=[...SPECIES].sort((a,b)=>b.pts[years.length-1][0]-a.pts[years.length-1][0]);
  const usedY=[];
  sorted.forEach(sp=>{
    let ly=yOf(sp.pts[years.length-1][0]);
    usedY.forEach(uy=>{if(Math.abs(ly-uy)<13)ly=uy+13;});usedY.push(ly);
    ctx.font='500 10px system-ui,sans-serif';ctx.fillStyle=sp.color;ctx.textAlign='left';ctx.fillText(sp.name,PL+CW+8,ly+4);
  });

  // title
  ctx.font='500 16px system-ui,sans-serif';ctx.fillStyle='rgba(205,230,250,.88)';ctx.textAlign='left';ctx.fillText('Whale populations · 1900–2024',PL,36);
  ctx.font='400 10px system-ui,sans-serif';ctx.fillStyle='rgba(80,130,165,.65)';ctx.fillText('Six species · global best estimates with 95% confidence intervals',PL,54);

  // ── WHALE SILHOUETTE LEGEND ─────────────────────────────────────────
  const legY=H-66;const legItemW=104;
  SPECIES.forEach((sp,i)=>{
    const lx=PL+(i%3)*(legItemW+4);
    const ly=legY+(i>=3?28:0);
    const [r,g,b]=hexRgb(sp.color);
    ctx.save();ctx.globalAlpha=.75;
    ctx.fillStyle=sp.color;ctx.strokeStyle=sp.color;ctx.lineWidth=.8;
    whalePath(ctx,sp.kind,lx+14,ly+8,18,9);
    ctx.fill();ctx.stroke();
    ctx.globalAlpha=1;
    ctx.font='400 9.5px system-ui,sans-serif';ctx.fillStyle=sp.color;ctx.textAlign='left';ctx.fillText(sp.name,lx+28,ly+12);
    ctx.restore();
  });

  // legend symbols bottom-right
  const lrx=PL+3*legItemW+20,lry=legY;
  ctx.font='400 9px system-ui,sans-serif';ctx.textAlign='left';
  ctx.strokeStyle='rgba(200,200,200,.45)';ctx.lineWidth=1.2;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(lrx,lry);ctx.lineTo(lrx+20,lry);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(160,190,215,.5)';ctx.fillText('modelled',lrx+24,lry+3.5);
  ctx.strokeStyle='rgba(200,200,200,.75)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(lrx,lry+13);ctx.lineTo(lrx+20,lry+13);ctx.stroke();
  ctx.fillStyle='rgba(160,190,215,.5)';ctx.fillText('survey-based',lrx+24,lry+16.5);
  ctx.strokeStyle='rgba(200,200,200,.22)';ctx.lineWidth=.6;ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(lrx,lry+26);ctx.lineTo(lrx+20,lry+26);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(160,190,215,.5)';ctx.fillText('95% CI',lrx+24,lry+29.5);

  ctx.font='400 8.5px system-ui,sans-serif';ctx.fillStyle='rgba(70,120,155,.35)';ctx.textAlign='left';
  ctx.fillText('IWC · Whitehead et al. (2022) · IUCN Red List · Branch et al. (2008)',PL,H-10);

  if(hxRaw!==null){
    const ni=Math.max(0,Math.min(years.length-1,Math.round((hxRaw-PL)/CW*(years.length-1))));
    const hx=xOf(ni);
    ctx.beginPath();ctx.moveTo(hx,PT-10);ctx.lineTo(hx,PT+CH);ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([]);
    return ni;
  }
  return null;
}

const tip=document.getElementById('tip');
const cht=document.getElementById('cht');
cht.addEventListener('mousemove',e=>{
  const rect=cw.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  if(mx<PL||mx>PL+CW){tip.style.display='none';return;}
  cancelAnimationFrame(frameId);
  const idx=drawChartFrame(mx);
  frameId=requestAnimationFrame(loop);
  if(idx===null){tip.style.display='none';return;}
  tip.querySelector('.ty').textContent=years[idx];
  tip.querySelectorAll('.tr').forEach(r=>r.remove());
  SPECIES.slice().sort((a,b)=>b.pts[idx][0]-a.pts[idx][0]).forEach(sp=>{
    const [best,lo,hi]=sp.pts[idx];
    const fmt=v=>v>=10?Math.round(v)+'k':v.toFixed(1)+'k';
    const row=document.createElement('div');row.className='tr';
    row.innerHTML=`<span class="tc" style="background:${sp.color}"></span><span style="flex:1;color:#8bbdd4">${sp.name}</span><span style="font-weight:500;color:${sp.color}">${fmt(best)}</span><span class="tconf">${sp.obs[idx]?'surveyed':'modelled'} · ${fmt(lo)}–${fmt(hi)}</span>`;
    tip.appendChild(row);
  });
  tip.style.display='block';
  const tipW=205,lx=e.clientX-rect.left,ly=e.clientY-rect.top;
  tip.style.left=(lx+14+tipW>rect.width?lx-tipW-10:lx+14)+'px';
  tip.style.top=Math.max(8,ly-20)+'px';
});
cht.addEventListener('mouseleave',()=>{tip.style.display='none';});

const SCOL={
  'Sperm whale':'#4ecdc4',
  'Fin whale':'#a78bfa',
  'S. Right whale':'#86efac',
  'Humpback':'#fbbf24',
  'Blue whale':'#f87171',
  'Killer whale':'#e2e8f0',
};

let activeSpecies=null;
const mapCanvas=document.getElementById('map-canvas');
const mapH=360;
mapCanvas.width=W*2;mapCanvas.height=mapH*2;mapCanvas.style.height=mapH+'px';
const mctx=mapCanvas.getContext('2d');mctx.scale(2,2);
let worldData=null;
let projection;

function latLonToXY(lat,lon){
  const p=projection([lon,lat]);
  return p?{x:p[0],y:p[1]}:null;
}

function drawMap(){
  mctx.clearRect(0,0,W,mapH);
  mctx.fillStyle='#040d1e';mctx.fillRect(0,0,W,mapH);

  if(!worldData)return;
  const path=d3.geoPath(projection,mctx);
  mctx.beginPath();path(worldData);
  mctx.fillStyle='#0e2240';mctx.strokeStyle='rgba(100,150,200,0.18)';mctx.lineWidth=0.5;
  mctx.fill();mctx.stroke();

  HOTSPOTS.forEach(hs=>{
    const show=!activeSpecies||hs.species.includes(activeSpecies);
    if(!show)return;
    const p=latLonToXY(hs.lat,hs.lon);
    if(!p)return;
    const cols=activeSpecies?[SCOL[activeSpecies]]:hs.species.slice(0,3).map(s=>SCOL[s]||'#888');
    const r=5+cols.length;
    cols.forEach((c,i)=>{
      const ang=-Math.PI/2+(i/cols.length)*Math.PI*2;
      mctx.beginPath();mctx.arc(p.x,p.y,r,ang,ang+(1/cols.length)*Math.PI*2);
      mctx.lineTo(p.x,p.y);mctx.closePath();
      mctx.fillStyle=c;mctx.globalAlpha=.85;mctx.fill();mctx.globalAlpha=1;
    });
    mctx.beginPath();mctx.arc(p.x,p.y,r,0,Math.PI*2);
    mctx.strokeStyle='rgba(255,255,255,0.3)';mctx.lineWidth=0.7;mctx.stroke();
  });
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
  worldData=topojson.feature(world,world.objects.countries);
  projection=d3.geoNaturalEarth1().fitSize([W,mapH],worldData);
  drawMap();
});

// map legend
const legDiv=document.getElementById('map-legend');
Object.entries(SCOL).forEach(([name,col])=>{
  const item=document.createElement('div');item.className='ml-item';
  item.innerHTML=`<span class="ml-dot" style="background:${col}"></span>${name}`;
  item.addEventListener('click',()=>{
    activeSpecies=activeSpecies===name?null:name;
    legDiv.querySelectorAll('.ml-item').forEach(el=>el.classList.remove('active'));
    if(activeSpecies)item.classList.add('active');
    drawMap();
  });
  legDiv.appendChild(item);
});

// map tooltip
const mapTip=document.getElementById('map-tip');
mapCanvas.addEventListener('mousemove',e=>{
  if(!worldData)return;
  const rect=mapCanvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(mapH/rect.height);
  let closest=null,minD=Infinity;
  HOTSPOTS.forEach(hs=>{
    const show=!activeSpecies||hs.species.includes(activeSpecies);
    if(!show)return;
    const p=latLonToXY(hs.lat,hs.lon);
    if(!p)return;
    const d=Math.hypot(mx-p.x,my-p.y);
    if(d<24&&d<minD){minD=d;closest=hs;}
  });
  if(closest){
    mapTip.style.display='block';
    mapTip.innerHTML=`<div style="font-weight:500;margin-bottom:4px;color:#d0eaf8">${closest.name}</div>`+
      closest.species.map(s=>`<span style="display:inline-block;margin:2px 4px 2px 0;padding:1px 7px;border-radius:10px;background:${SCOL[s]}22;color:${SCOL[s]};font-size:10px;border:0.5px solid ${SCOL[s]}44">${s}</span>`).join('');
    const lx=e.clientX-rect.left,ly=e.clientY-rect.top;
    mapTip.style.left=(lx+12)+'px';mapTip.style.top=(ly-10)+'px';
  } else {
    mapTip.style.display='none';
  }
});
mapCanvas.addEventListener('mouseleave',()=>{mapTip.style.display='none';});

document.getElementById('t-map').addEventListener('click',()=>{
  document.getElementById('t-map').classList.add('on');
  document.getElementById('t-pop').classList.remove('on');
  document.getElementById('p-map').classList.add('on');
  document.getElementById('p-pop').classList.remove('on');
  cancelAnimationFrame(frameId);
  drawMap();
});
